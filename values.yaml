# ---------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------
global:
  imageRegistry: ""        # Set to your ECR URL in values-prod.yaml
  imagePullPolicy: IfNotPresent
  namespace: online-boutique

# ---------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: shop.yourdomain.com    # Replace with your domain
  tls:
    enabled: true
    secretName: online-boutique-tls

# ---------------------------------------------------------------
# Services
# ---------------------------------------------------------------
services:
  frontend:
    image: gcr.io/google-samples/microservices-demo/frontend
    tag: v0.8.0
    replicas: 2
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 60
    env:
      AD_SERVICE_ADDR: "adservice:9555"
      CART_SERVICE_ADDR: "cartservice:7070"
      CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"

  cartservice:
    image: gcr.io/google-samples/microservices-demo/cartservice
    tag: v0.8.0
    replicas: 1
    port: 7070
    resources:
      requests:
        cpu: 200m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 128Mi
    env:
      REDIS_ADDR: "redis-cart:6379"

  productcatalogservice:
    image: gcr.io/google-samples/microservices-demo/productcatalogservice
    tag: v0.8.0
    replicas: 1
    port: 3550
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  currencyservice:
    image: gcr.io/google-samples/microservices-demo/currencyservice
    tag: v0.8.0
    replicas: 1
    port: 7000
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  paymentservice:
    image: gcr.io/google-samples/microservices-demo/paymentservice
    tag: v0.8.0
    replicas: 1
    port: 50051
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  shippingservice:
    image: gcr.io/google-samples/microservices-demo/shippingservice
    tag: v0.8.0
    replicas: 1
    port: 50051
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  emailservice:
    image: gcr.io/google-samples/microservices-demo/emailservice
    tag: v0.8.0
    replicas: 1
    port: 5000
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  checkoutservice:
    image: gcr.io/google-samples/microservices-demo/checkoutservice
    tag: v0.8.0
    replicas: 1
    port: 5050
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    env:
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      PAYMENT_SERVICE_ADDR: "paymentservice:50051"
      EMAIL_SERVICE_ADDR: "emailservice:5000"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"

  recommendationservice:
    image: gcr.io/google-samples/microservices-demo/recommendationservice
    tag: v0.8.0
    replicas: 1
    port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 220Mi
      limits:
        cpu: 200m
        memory: 450Mi
    env:
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"

  adservice:
    image: gcr.io/google-samples/microservices-demo/adservice
    tag: v0.8.0
    replicas: 1
    port: 9555
    resources:
      requests:
        cpu: 200m
        memory: 180Mi
      limits:
        cpu: 300m
        memory: 300Mi

  redis:
    image: redis
    tag: alpine
    replicas: 1
    port: 6379
    resources:
      requests:
        cpu: 70m
        memory: 200Mi
      limits:
        cpu: 125m
        memory: 256Mi
