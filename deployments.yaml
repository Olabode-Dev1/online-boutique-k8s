{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: online-boutique
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        app.kubernetes.io/name: {{ $name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
    spec:
      terminationGracePeriodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: {{ $name }}
          {{- if $.Values.global.imageRegistry }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image }}:{{ $svc.tag }}"
          {{- else }}
          image: "{{ $svc.image }}:{{ $svc.tag }}"
          {{- end }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          resources:
            requests:
              cpu: {{ $svc.resources.requests.cpu }}
              memory: {{ $svc.resources.requests.memory }}
            limits:
              cpu: {{ $svc.resources.limits.cpu }}
              memory: {{ $svc.resources.limits.memory }}
          {{- if $svc.env }}
          env:
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          readinessProbe:
            {{- if eq $name "frontend" }}
            httpGet:
              path: /_healthz
              port: {{ $svc.port }}
            {{- else }}
            tcpSocket:
              port: {{ $svc.port }}
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            {{- if eq $name "frontend" }}
            httpGet:
              path: /_healthz
              port: {{ $svc.port }}
            {{- else }}
            tcpSocket:
              port: {{ $svc.port }}
            {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
{{- end }}
